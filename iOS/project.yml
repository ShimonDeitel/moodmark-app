name: Moodmark
options:
  bundleIdPrefix: com.shimondeitel.moodlog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Moodmark:
    type: application
    platform: iOS
    sources:
      - path: Moodmark
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.moodlog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Moodmark/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  MoodmarkTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: MoodmarkTests
      - path: Moodmark.storekit
    dependencies:
      - target: Moodmark
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.moodlog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  MoodmarkUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: MoodmarkUITests
    dependencies:
      - target: Moodmark
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.moodlog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Moodmark:
    build:
      targets:
        Moodmark: all
        MoodmarkTests: [test]
        MoodmarkUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Moodmark.storekit
    test:
      config: Debug
      storeKitConfiguration: Moodmark.storekit
      targets:
        - MoodmarkTests
        - MoodmarkUITests
    archive:
      config: Release
